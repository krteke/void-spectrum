seed = "#0000ff"

[meta]
name = "File Theme"
mode = "light"

[colors]
"editor.cursor" = "{material.primary}"
"editor.selection.background" = "#102030"
"editor.selection.foreground" = "{editor.selection.background}"
"overlay.scrim" = "#10203080"

[lengths]
"spacing.medium" = "8px"
"editor.gutter_width" = "3rem"

[radii]
"radius.card" = "12px"

[font_weights]
"font.body" = "450"
"editor.font_weight" = "{font.body}"

[font_styles]
"font.style" = "italic"
"editor.font_style" = "{font.style}"
