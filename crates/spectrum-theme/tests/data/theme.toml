seed = "#0000ff"

[meta]
name = "File Theme"
mode = "light"

[colors]
"editor.cursor" = "{material.primary}"
"editor.selection.background" = "#102030"
"editor.selection.foreground" = "{editor.selection.background}"
"overlay.scrim" = "#10203080"

[lengths]
"spacing.medium" = "8px"
"editor.gutter_width" = "3rem"

[radii]
"radius.card" = "12px"

[font_weights]
"font.body" = "450"
"editor.font_weight" = "{font.body}"

[font_styles]
"font.style" = "italic"
"editor.font_style" = "{font.style}"

[line_heights]
"line_height.body" = "1.5"
"editor.line_height" = "20px"

[[shadows]]
path = "shadow.card"
color = "#00000040"
offset_x = "0px"
offset_y = "2px"
blur = "8px"
spread = "0px"
